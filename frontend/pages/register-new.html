<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smash&Heal</title>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smash&Heal</title>
   
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/home.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="auth-main">
        <div class="auth-container register-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo" style="justify-content: center;">
                        <div class="logo-icon">
                            <i class="fas fa-leaf"></i>
                            <i class="fas fa-heart"></i>
                        </div>
                        <div class="logo-text">
                            <span class="smash">Smash</span>
                            <span class="and">&</span>
                            <span class="heal">Heal</span>
                        </div>
                    </div>
                    <h1>Join Smash&Heal</h1>
                    <p>Create your account to start your mental wellness journey</p>
                </div>

                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="full-name">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input type="text" id="full-name" name="full-name" required placeholder="Enter your full name">
                        <div class="field-error" id="full-name-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="register-email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="register-email" name="register-email" required placeholder="Enter your email address">
                        <div class="field-error" id="register-email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="register-password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input-container">
                            <input type="password" id="register-password" name="register-password" required placeholder="Create a strong password">
                            <button type="button" class="password-toggle" id="register-password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-requirements" id="password-requirements">
                            <p>Password must contain:</p>
                            <ul>
                                <li id="req-length" class="requirement">
                                    <i class="fas fa-circle-notch requirement-icon unchecked"></i>
                                    <span>At least 8 characters</span>
                                </li>
                                <li id="req-uppercase" class="requirement">
                                    <i class="fas fa-circle-notch requirement-icon unchecked"></i>
                                    <span>One uppercase letter (A-Z)</span>
                                </li>
                                <li id="req-lowercase" class="requirement">
                                    <i class="fas fa-circle-notch requirement-icon unchecked"></i>
                                    <span>One lowercase letter (a-z)</span>
                                </li>
                                <li id="req-number" class="requirement">
                                    <i class="fas fa-circle-notch requirement-icon unchecked"></i>
                                    <span>One number (0-9)</span>
                                </li>
                                <li id="req-symbol" class="requirement">
                                    <i class="fas fa-circle-notch requirement-icon unchecked"></i>
                                    <span>One special character (!@#$%^&*)</span>
                                </li>
                            </ul>
                        </div>
                        <div class="field-error" id="register-password-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>
                        <div class="password-input-container">
                            <input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm your password">
                            <button type="button" class="password-toggle" id="confirm-password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="confirm-password-error"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="terms-agree" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                        </label>
                        <div class="field-error" id="terms-error"></div>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in here</a></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/components.js"></script>
</body>
</html>
