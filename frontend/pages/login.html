<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smash&Heal</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <main class="login-main">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo-container">
                        <div class="logo">
                            <div class="logo-icon">
                                <i class="fas fa-leaf"></i>
                                <i class="fas fa-heart"></i>
                            </div>
                            <div class="logo-text">
                                <span class="smash">Smash</span>
                                <span class="and">&</span>
                                <span class="heal">Heal</span>
                            </div>
                        </div>
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Sign in to your Smash&Heal account</p>
                </div>

                <form action="#" method="POST" id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                        <div class="field-error" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input-container">
                            <input type="password" id="password" name="password" required
                                placeholder="Enter your password">
                            <button type="button" class="password-toggle" id="password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="password-error"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember-me">
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">
                        <span class="btn-text">Sign In</span>
                        <div class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </button>
                </form>

                <div class="login-footer">
                    <p>Don't have an account? <a href="register.html">Create one here</a></p>
                    <div class="divider">
                        <span>or</span>
                    </div>
                    <div class="social-login">
                        <button class="social-btn google-btn">
                            <i class="fab fa-google"></i>
                            Continue with Google
                        </button>
                        <button class="social-btn facebook-btn">
                            <i class="fab fa-facebook-f"></i>
                            Continue with Facebook
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Load header and footer components
        function loadComponents() {
            fetch('../components/header.html')
                .then(response => {
                    if (!response.ok) throw new Error('Header not found');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error loading header:', error));

            fetch('../components/footer.html')
                .then(response => {
                    if (!response.ok) throw new Error('Footer not found');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error loading footer:', error));
        }

        loadComponents();

        // Password toggle functionality
        const passwordToggle = document.getElementById('password-toggle');
        const passwordInput = document.getElementById('password');

        if (passwordToggle) {
            passwordToggle.addEventListener('click', function () {
                const icon = this.querySelector('i');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.className = 'fas fa-eye-slash';
                } else {
                    passwordInput.type = 'password';
                    icon.className = 'fas fa-eye';
                }
            });
        }

        // Form submission handler
        const loginForm = document.getElementById('login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', function (e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const emailError = document.getElementById('email-error');
                const passwordError = document.getElementById('password-error');

                emailError.textContent = '';
                passwordError.textContent = '';

                let isValid = true;

                if (!email) {
                    emailError.textContent = 'Email is required';
                    isValid = false;
                } else if (!email.includes('@')) {
                    emailError.textContent = 'Please enter a valid email';
                    isValid = false;
                }

                if (!password) {
                    passwordError.textContent = 'Password is required';
                    isValid = false;
                } else if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    isValid = false;
                }

                if (isValid) {
                    const btn = document.querySelector('.login-btn');
                    const btnText = btn.querySelector('.btn-text');
                    const btnLoader = btn.querySelector('.btn-loader');
                    btnText.style.display = 'none';
                    btnLoader.style.display = 'inline-block';
                    btn.disabled = true;

                    setTimeout(() => {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userEmail', email);
                        alert('Login successful! Redirecting...');
                        window.location.href = 'index.html';
                    }, 1500);
                }
            });
        }
    </script>
</body>

</html>
