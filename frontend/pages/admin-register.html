<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Smash&Heal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
    <main class="auth-main">
        <div class="auth-container register-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo" style="justify-content: center;">
                        <div class="logo-icon">
                            <i class="fas fa-leaf"></i>
                            <i class="fas fa-heart"></i>
                        </div>
                        <div class="logo-text">
                            <span class="smash">Smash</span>
                            <span class="and">&</span>
                            <span class="heal">Heal</span>
                        </div>
                    </div>
                    <span class="admin-badge" style="display: inline-block; background: #ff9800; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 15px;">
                        <i class="fas fa-shield-alt"></i> Administrator
                    </span>
                    <h1>Create Admin Account</h1>
                    <p>Create an administrator account to manage the Smash&Heal system</p>
                </div>

                <form id="admin-register-form" class="auth-form">
                    <div class="form-group">
                        <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                        <div class="field-error" id="fullName-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="admin@smashandheal.com">
                        <div class="field-error" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input-container">
                            <input type="password" id="password" name="password" required placeholder="Create a strong password">
                            <button type="button" class="password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-requirements">
                            <p>Password must contain:</p>
                            <ul>
                                <li id="req-length" class="requirement"><i class="fas fa-circle-notch"></i> At least 8 characters</li>
                                <li id="req-uppercase" class="requirement"><i class="fas fa-circle-notch"></i> One uppercase letter</li>
                                <li id="req-lowercase" class="requirement"><i class="fas fa-circle-notch"></i> One lowercase letter</li>
                                <li id="req-number" class="requirement"><i class="fas fa-circle-notch"></i> One number</li>
                                <li id="req-symbol" class="requirement"><i class="fas fa-circle-notch"></i> One special character</li>
                            </ul>
                        </div>
                        <div class="field-error" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                        <div class="password-input-container">
                            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                            <button type="button" class="password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="confirmPassword-error"></div>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-user-shield"></i> Create Admin Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p><a href="login.html">← Back to Login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="/assets/js/auth.js"></script>
    <script>
        // Password requirements update
        function updateAdminPasswordRequirements(password) {
            const checks = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                symbol: /[!@#$%^&*]/.test(password)
            };
            
            for (const [key, valid] of Object.entries(checks)) {
                const element = document.getElementById(`req-${key}`);
                if (element) {
                    const icon = element.querySelector('i');
                    if (valid) {
                        element.classList.add('met');
                        icon.className = 'fas fa-check-circle';
                    } else {
                        element.classList.remove('met');
                        icon.className = 'fas fa-circle-notch';
                    }
                }
            }
            return Object.values(checks).every(v => v === true);
        }
        
        document.getElementById('password')?.addEventListener('input', function() {
            updateAdminPasswordRequirements(this.value);
        });
        
        // Form submission
        document.getElementById('admin-register-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Clear errors
            document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
            
            let isValid = true;
            
            if (!fullName) {
                document.getElementById('fullName-error').textContent = 'Full name is required';
                isValid = false;
            }
            
            if (!email) {
                document.getElementById('email-error').textContent = 'Email is required';
                isValid = false;
            } else if (!email.includes('@')) {
                document.getElementById('email-error').textContent = 'Please enter a valid email';
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('password-error').textContent = 'Password is required';
                isValid = false;
            } else if (!updateAdminPasswordRequirements(password)) {
                document.getElementById('password-error').textContent = 'Please meet all password requirements';
                isValid = false;
            }
            
            if (!confirmPassword) {
                document.getElementById('confirmPassword-error').textContent = 'Please confirm your password';
                isValid = false;
            } else if (password !== confirmPassword) {
                document.getElementById('confirmPassword-error').textContent = 'Passwords do not match';
                isValid = false;
            }
            
            if (isValid) {
                const btn = document.querySelector('.auth-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Admin Account...';
                
                const result = await register(fullName, email, password, true);
                
                if (result.success) {
                    window.location.href = '/pages/admin-dashboard.html';
                } else {
                    document.getElementById('email-error').textContent = result.message;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-shield"></i> Create Admin Account';
                }
            }
        });
        
        // Password toggle
        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'fas fa-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'fas fa-eye';
                }
            });
        });
    </script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/components.js"></script>
</body>
</html>
