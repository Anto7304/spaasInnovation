<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Smash&Heal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a3a1f 0%, #0d2610 100%);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }
        
        .admin-logo {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .admin-logo i {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .admin-nav {
            list-style: none;
            padding: 0;
        }
        
        .admin-nav li {
            margin-bottom: 10px;
        }
        
        .admin-nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .admin-nav a:hover,
        .admin-nav a.active {
            background: rgba(76, 175, 80, 0.3);
            color: white;
        }
        
        .admin-main {
            flex: 1;
            padding: 30px;
            background: #f5f5f5;
        }
        
        .admin-header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-info h3 {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #2d5a3d;
        }
        
        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f5f5f5;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fas fa-leaf"></i>
                <h3>Smash&Heal</h3>
                <p style="font-size: 12px; opacity: 0.7;">Admin Panel</p>
            </div>
            <ul class="admin-nav">
                <li><a href="#" class="active" onclick="switchTab('dashboard')">📊 Dashboard</a></li>
                <li><a href="#" onclick="switchTab('users')">👥 Users</a></li>
                <li><a href="#" onclick="switchTab('bookings')">📅 Bookings</a></li>
            </ul>
            <button class="logout-btn" onclick="logout()" style="margin-top: 30px; width: 100%;">Logout</button>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <span style="background: #4CAF50; color: white; padding: 5px 15px; border-radius: 20px;">Administrator</span>
            </div>
            
            <div id="dashboard-tab">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Users</h3>
                            <div class="stat-number" id="totalUsers">0</div>
                        </div>
                        <i class="fas fa-users" style="font-size: 40px; opacity: 0.3;"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Bookings</h3>
                            <div class="stat-number" id="totalBookings">0</div>
                        </div>
                        <i class="fas fa-calendar" style="font-size: 40px; opacity: 0.3;"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Revenue</h3>
                            <div class="stat-number" id="totalRevenue">KES 0</div>
                        </div>
                        <i class="fas fa-money" style="font-size: 40px; opacity: 0.3;"></i>
                    </div>
                </div>
            </div>
            
            <div id="users-tab" style="display: none;">
                <div class="table-container">
                    <h3>Registered Users</h3>
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div id="bookings-tab" style="display: none;">
                <div class="table-container">
                    <h3>All Bookings</h3>
                    <table>
                        <thead>
                            <tr><th>ID</th><th>User</th><th>Session Type</th><th>Date</th><th>Status</th></tr>
                        </thead>
                        <tbody id="bookingsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5001/api';
        
        // Check admin auth
        async function checkAdminAuth() {
            const token = localStorage.getItem('authToken');
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (!token || user.role !== 'admin') {
                window.location.href = '/pages/login.html';
                return false;
            }
            return true;
        }
        
        // Load dashboard data from backend
        async function loadDashboardData() {
            const token = localStorage.getItem('authToken');
            
            try {
                // Fetch users from backend
                const usersRes = await fetch(`${API_URL}/admin/users/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (usersRes.ok) {
                    const usersData = await usersRes.json();
                    const users = usersData.users || [];
                    document.getElementById('totalUsers').textContent = users.length;
                    
                    // Load users table
                    const usersTableBody = document.getElementById('usersTableBody');
                    usersTableBody.innerHTML = users.map(user => `
                        <tr>
                            <td>${user._id || user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td>${user.role || 'user'}</td>
                            <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                        </tr>
                    `).join('');
                }
                
                // Fetch bookings from backend
                const bookingsRes = await fetch(`${API_URL}/admin/bookings/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (bookingsRes.ok) {
                    const bookingsData = await bookingsRes.json();
                    const bookings = bookingsData.bookings || [];
                    document.getElementById('totalBookings').textContent = bookings.length;
                    
                    // Calculate total revenue
                    const totalRevenue = bookings.reduce((sum, b) => sum + (b.price || 0), 0);
                    document.getElementById('totalRevenue').textContent = `KES ${totalRevenue}`;
                    
                    // Load bookings table
                    const bookingsTableBody = document.getElementById('bookingsTableBody');
                    bookingsTableBody.innerHTML = bookings.map(booking => `
                        <tr>
                            <td>${booking._id}</td>
                            <td>${booking.user?.name || 'N/A'}</td>
                            <td>${booking.sessionType}</td>
                            <td>${new Date(booking.bookingDate).toLocaleDateString()}</td>
                            <td>${booking.paymentStatus || 'pending'}</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        function switchTab(tab) {
            document.getElementById('dashboard-tab').style.display = 'none';
            document.getElementById('users-tab').style.display = 'none';
            document.getElementById('bookings-tab').style.display = 'none';
            
            document.getElementById(`${tab}-tab`).style.display = 'block';
        }
        
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
            window.location.href = '/index.html';
        }
        
        if (checkAdminAuth()) {
            loadDashboardData();
        }
    </script>
</body>
</html>
