<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smash&Heal</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <!-- Header -->
    <div id="header">
        <!-- Include header component -->
        <!-- Placeholder for header content -->
    </div>

    <!-- Navbar -->
    <nav id="navbar">
        <!-- Include navbar component -->
        <!-- Placeholder for navbar content -->
    </nav>

    <main>
        <h1>Contact Us</h1>
        <form action="#" method="post" aria-labelledby="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required aria-required="true">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required aria-required="true">

            <label for="message">Message:</label>
            <textarea id="message" name="message" required aria-required="true"></textarea>

            <button type="submit">Send Message</button>
        </form>

        <section id="contact-details">
            <h2>Our Contact Details</h2>
            <p>Email: info@smashandheal.org</p>
            <p>Phone: +254 114900024</p>
            <div id="map">
                <!-- Placeholder for embedded map -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer">
        <!-- Include footer component -->
        <!-- Placeholder for footer content -->
    </footer>

    <script src="../assets/js/scripts.js"></script>
</body>
</html>
