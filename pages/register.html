<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smash&Heal</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Include header component -->
    <div id="header-placeholder"></div>

    <main class="register-main">
        <div class="register-container">
            <div class="register-card">
                <div class="register-header">
                    <div class="logo-container">
                        <div class="logo">
                            <div class="logo-icon">
                                <i class="fas fa-leaf" style="color: #66BB6A;"></i>
                                <i class="fas fa-heart" style="color: #EF5350;"></i>
                            </div>
                            <div class="logo-text">
                                <span class="smash">Smash</span>
                                <span class="and">&</span>
                                <span class="heal">Heal</span>
                            </div>
                        </div>
                    </div>
                    <h1>Join Smash&Heal</h1>
                    <p>Create your account to start your mental wellness journey</p>
                </div>

                <form action="#" method="POST" id="register-form" class="register-form">
                    <div class="form-group">
                        <label for="full-name">
                            <i class="fas fa-user"></i>
                            Full Name
                        </label>
                        <input type="text" id="full-name" name="full-name" required aria-required="true" placeholder="Enter your full name">
                        <div class="field-error" id="full-name-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="register-email">
                            <i class="fas fa-envelope"></i>
                            Email Address
                        </label>
                        <input type="email" id="register-email" name="register-email" required aria-required="true" placeholder="Enter your email address">
                        <div class="field-error" id="register-email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="register-password">
                            <i class="fas fa-lock"></i>
                            Password
                        </label>
                        <div class="password-input-container">
                            <input type="password" id="register-password" name="register-password" required aria-required="true" placeholder="Create a strong password">
                            <button type="button" class="password-toggle" id="register-password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="register-password-error"></div>
                        <div class="password-requirements">
                            <p>Password must contain:</p>
                            <ul>
                                <li id="req-length" class="requirement">
                                    <i class="fas fa-times"></i>
                                    At least 8 characters
                                </li>
                                <li id="req-uppercase" class="requirement">
                                    <i class="fas fa-times"></i>
                                    One uppercase letter
                                </li>
                                <li id="req-lowercase" class="requirement">
                                    <i class="fas fa-times"></i>
                                    One lowercase letter
                                </li>
                                <li id="req-number" class="requirement">
                                    <i class="fas fa-times"></i>
                                    One number
                                </li>
                                <li id="req-symbol" class="requirement">
                                    <i class="fas fa-times"></i>
                                    One special character
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">
                            <i class="fas fa-lock"></i>
                            Confirm Password
                        </label>
                        <div class="password-input-container">
                            <input type="password" id="confirm-password" name="confirm-password" required aria-required="true" placeholder="Confirm your password">
                            <button type="button" class="password-toggle" id="confirm-password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="confirm-password-error"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="terms-agree" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                        </label>
                        <div class="field-error" id="terms-error"></div>
                    </div>

                    <button type="submit" class="register-btn">
                        <span class="btn-text">Create Account</span>
                        <div class="btn-loader" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </button>
                </form>

                <div class="register-footer">
                    <p>Already have an account? <a href="login.html">Sign in here</a></p>
                    <div class="divider">
                        <span>or</span>
                    </div>
                    <div class="social-login">
                        <button class="social-btn google-btn">
                            <i class="fab fa-google"></i>
                            Continue with Google
                        </button>
                        <button class="social-btn facebook-btn">
                            <i class="fab fa-facebook-f"></i>
                            Continue with Facebook
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Include footer component -->
    <div id="footer-placeholder"></div>

    <script src="../assets/js/scripts.js"></script>
    <script>
        // Load header and footer components
        fetch('../components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });

        fetch('../components/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
            });

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });

        // Password toggle functionality
        document.getElementById('register-password-toggle').addEventListener('click', function() {
            const passwordInput = document.getElementById('register-password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        document.getElementById('confirm-password-toggle').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirm-password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        // Real-time password validation
        document.getElementById('register-password').addEventListener('input', function() {
            updatePasswordRequirements(this.value);
        });
    </script>
</body>
</html>
